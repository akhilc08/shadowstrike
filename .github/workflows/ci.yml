name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: Run tests
        run: cargo test --workspace

      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

  build-client:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-opt
        run: |
          sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build client WASM
        run: wasm-pack build crates/client --target web --release

      - name: Optimize WASM
        run: wasm-opt -Os crates/client/pkg/client_bg.wasm -o crates/client/pkg/client_bg.wasm

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-pkg
          path: crates/client/pkg/

  build-relay:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build relay
        run: cargo build --release -p relay

      - name: Upload relay artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-binary
          path: target/release/relay
