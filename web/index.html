<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ShadowStrike</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050510;
    color: #ccc;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    margin: 20px 0 5px;
    font-size: 2.2rem;
    color: #fff;
    letter-spacing: 8px;
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(255,120,0,0.3), 0 0 40px rgba(100,50,200,0.2);
  }
  .subtitle {
    font-size: 0.7rem;
    color: #555;
    letter-spacing: 4px;
    margin-bottom: 15px;
  }
  #select-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
  }
  .mode-toggle {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }
  .mode-toggle button {
    padding: 8px 24px;
    border: 2px solid #333;
    background: #111;
    color: #888;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-toggle button.active { border-color: #ff6600; color: #ff6600; }
  .mode-toggle button:hover { border-color: #666; }
  .player-select {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .player-select h2 {
    font-size: 0.85rem;
    color: #888;
  }
  .element-buttons {
    display: flex;
    gap: 8px;
  }
  .element-buttons button {
    padding: 8px 18px;
    border: 2px solid #333;
    background: #111;
    color: #ccc;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .element-buttons button:hover { border-color: #666; }
  .element-buttons button[data-element="0"].selected { border-color: #ff6600; color: #ff6600; }
  .element-buttons button[data-element="1"].selected { border-color: #aaccff; color: #aaccff; }
  .element-buttons button[data-element="2"].selected { border-color: #9933ff; color: #9933ff; }
  .element-buttons button[data-element="3"].selected { border-color: #66eeff; color: #66eeff; }
  #online-panel {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 5px;
  }
  #online-panel.visible { display: flex; }
  #online-panel input {
    padding: 8px 16px;
    border: 2px solid #333;
    background: #111;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    text-align: center;
    letter-spacing: 4px;
    text-transform: uppercase;
    width: 160px;
  }
  #online-panel input::placeholder {
    color: #444;
    letter-spacing: 2px;
    text-transform: none;
  }
  .online-buttons {
    display: flex;
    gap: 10px;
  }
  .online-buttons button {
    padding: 8px 20px;
    border: 2px solid #555;
    background: #1a1a1a;
    color: #ccc;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .online-buttons button:hover { background: #222; border-color: #888; }
  #room-status {
    font-size: 0.85rem;
    color: #33cc33;
    min-height: 20px;
  }
  #start-btn {
    margin-top: 8px;
    padding: 12px 40px;
    border: 2px solid #555;
    background: #1a1a1a;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    display: none;
  }
  #start-btn.ready { display: block; border-color: #33cc33; color: #33cc33; }
  #start-btn:hover { background: #222; }
  canvas {
    display: none;
    border: 1px solid #222;
    margin-top: 15px;
  }
  #controls {
    margin-top: 12px;
    font-size: 0.7rem;
    color: #444;
    text-align: center;
    line-height: 1.6;
  }
  #net-indicator {
    display: none;
    position: fixed;
    top: 10px;
    right: 10px;
    padding: 4px 12px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #333;
    font-size: 0.7rem;
    color: #888;
    z-index: 10;
  }
  #net-indicator.connected { color: #33cc33; border-color: #33cc33; }
</style>
</head>
<body>
  <h1>ShadowStrike</h1>
  <div class="subtitle">ROLLBACK NETCODE FIGHTING</div>

  <div id="select-screen">
    <div class="mode-toggle">
      <button id="mode-local" class="active">Local (2P)</button>
      <button id="mode-online">Online</button>
    </div>

    <div class="player-select" id="p1-select">
      <h2>Player 1 &mdash; WASD + Z/X/C/V</h2>
      <div class="element-buttons" id="p1-elements">
        <button data-element="0">Fire</button>
        <button data-element="1">Lightning</button>
        <button data-element="2">Dark</button>
        <button data-element="3">Ice</button>
      </div>
    </div>
    <div class="player-select" id="p2-select">
      <h2>Player 2 &mdash; Arrows + J/K/L/;</h2>
      <div class="element-buttons" id="p2-elements">
        <button data-element="0">Fire</button>
        <button data-element="1">Lightning</button>
        <button data-element="2">Dark</button>
        <button data-element="3">Ice</button>
      </div>
    </div>

    <div id="online-panel">
      <div class="online-buttons">
        <button id="btn-create">Create Room</button>
        <button id="btn-join">Join Room</button>
      </div>
      <input id="room-code-input" type="text" placeholder="Room code" maxlength="4">
      <div id="room-status"></div>
    </div>

    <button id="start-btn">FIGHT</button>
  </div>

  <canvas id="game-canvas" width="1200" height="600"></canvas>
  <div id="net-indicator"></div>

  <div id="controls">
    <span id="controls-local">
      P1: WASD move &middot; Z light &middot; X heavy &middot; C special &middot; V block<br>
      P2: Arrows move &middot; J light &middot; K heavy &middot; L special &middot; ; block
    </span>
    <span id="controls-online" style="display:none">
      WASD move &middot; Z light &middot; X heavy &middot; C special &middot; V block
    </span>
  </div>

  <script type="module">
    import init, { ShadowStrike } from './pkg/client.js';

    let p1Element = null;
    let p2Element = null;
    let gameMode = 'local'; // 'local' or 'online'
    let game = null;

    // Default relay URL (same host, port 9001)
    const RELAY_WS = `ws://${location.hostname || 'localhost'}:9001`;

    // --- Element selection ---
    function setupSelection(containerId, setter) {
      const buttons = document.querySelectorAll(`#${containerId} button`);
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          setter(parseInt(btn.dataset.element));
          checkReady();
        });
      });
    }
    setupSelection('p1-elements', v => { p1Element = v; });
    setupSelection('p2-elements', v => { p2Element = v; });

    // --- Mode toggle ---
    const modeLocal = document.getElementById('mode-local');
    const modeOnline = document.getElementById('mode-online');
    const onlinePanel = document.getElementById('online-panel');
    const p2Select = document.getElementById('p2-select');
    const roomStatus = document.getElementById('room-status');

    modeLocal.addEventListener('click', () => {
      gameMode = 'local';
      modeLocal.classList.add('active');
      modeOnline.classList.remove('active');
      onlinePanel.classList.remove('visible');
      p2Select.style.display = '';
      checkReady();
    });

    modeOnline.addEventListener('click', () => {
      gameMode = 'online';
      modeOnline.classList.add('active');
      modeLocal.classList.remove('active');
      onlinePanel.classList.add('visible');
      // In online mode, P2 is remote — hide P2 element selection
      p2Select.style.display = 'none';
      // Auto-select a default for P2 so the game can start
      if (p2Element === null) p2Element = 1;
      checkReady();
    });

    // --- Online room management ---
    let onlineReady = false;

    document.getElementById('btn-create').addEventListener('click', async () => {
      if (p1Element === null) {
        roomStatus.textContent = 'Select your element first';
        roomStatus.style.color = '#cc3333';
        return;
      }
      await init();
      game = new ShadowStrike(p1Element, p2Element || 1);
      game.create_online_room(RELAY_WS);

      game.set_on_room_created((code) => {
        roomStatus.textContent = `Room: ${code} — waiting for opponent...`;
        roomStatus.style.color = '#33cc33';
        document.getElementById('room-code-input').value = code;
      });
      game.set_on_peer_joined(() => {
        roomStatus.textContent = 'Opponent joined! Press FIGHT';
        roomStatus.style.color = '#ffcc00';
        onlineReady = true;
        checkReady();
      });
      game.set_on_net_error((msg) => {
        roomStatus.textContent = `Error: ${msg}`;
        roomStatus.style.color = '#cc3333';
      });
    });

    document.getElementById('btn-join').addEventListener('click', async () => {
      const code = document.getElementById('room-code-input').value.trim().toUpperCase();
      if (!code) {
        roomStatus.textContent = 'Enter a room code';
        roomStatus.style.color = '#cc3333';
        return;
      }
      if (p1Element === null) {
        roomStatus.textContent = 'Select your element first';
        roomStatus.style.color = '#cc3333';
        return;
      }
      await init();
      game = new ShadowStrike(p1Element, p2Element || 1);
      game.join_online_room(RELAY_WS, code);

      game.set_on_room_joined((pid) => {
        roomStatus.textContent = `Joined as Player ${pid}! Press FIGHT`;
        roomStatus.style.color = '#ffcc00';
        onlineReady = true;
        checkReady();
      });
      game.set_on_net_error((msg) => {
        roomStatus.textContent = `Error: ${msg}`;
        roomStatus.style.color = '#cc3333';
      });
    });

    // --- Ready check ---
    function checkReady() {
      const btn = document.getElementById('start-btn');
      if (gameMode === 'local') {
        if (p1Element !== null && p2Element !== null) {
          btn.classList.add('ready');
        } else {
          btn.classList.remove('ready');
        }
      } else {
        // Online: need element selected and room joined
        if (p1Element !== null && onlineReady) {
          btn.classList.add('ready');
        } else {
          btn.classList.remove('ready');
        }
      }
    }

    // --- Start game ---
    document.getElementById('start-btn').addEventListener('click', async () => {
      if (gameMode === 'local') {
        if (p1Element === null || p2Element === null) return;
        await init();
        game = new ShadowStrike(p1Element, p2Element);
      } else {
        if (!game || !onlineReady) return;
        // Game already created during room setup
        const indicator = document.getElementById('net-indicator');
        indicator.style.display = 'block';
        indicator.textContent = 'ONLINE';
        indicator.classList.add('connected');
      }

      document.getElementById('select-screen').style.display = 'none';
      const canvas = document.getElementById('game-canvas');
      canvas.style.display = 'block';

      // Show appropriate controls text
      if (gameMode === 'online') {
        document.getElementById('controls-local').style.display = 'none';
        document.getElementById('controls-online').style.display = '';
      }

      document.addEventListener('keydown', e => {
        e.preventDefault();
        game.key_down(e.key);
      });
      document.addEventListener('keyup', e => {
        e.preventDefault();
        game.key_up(e.key);
      });

      function loop(timestamp) {
        game.update(timestamp);
        game.render('game-canvas');
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
