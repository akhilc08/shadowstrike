<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ShadowStrike</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050510;
    color: #ccc;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  h1 {
    margin: 20px 0 10px;
    font-size: 2rem;
    color: #fff;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
  #select-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    margin-top: 20px;
  }
  .player-select {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .player-select h2 {
    font-size: 1rem;
    color: #888;
  }
  .element-buttons {
    display: flex;
    gap: 10px;
  }
  .element-buttons button {
    padding: 10px 20px;
    border: 2px solid #333;
    background: #111;
    color: #ccc;
    font-family: inherit;
    font-size: 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .element-buttons button:hover { border-color: #666; }
  .element-buttons button.selected { border-color: #fff; color: #fff; }
  .element-buttons button[data-element="0"] { border-color: #ff6600; color: #ff6600; }
  .element-buttons button[data-element="1"] { border-color: #aaccff; color: #aaccff; }
  .element-buttons button[data-element="2"] { border-color: #9933ff; color: #9933ff; }
  .element-buttons button[data-element="3"] { border-color: #66eeff; color: #66eeff; }
  #start-btn {
    margin-top: 10px;
    padding: 12px 40px;
    border: 2px solid #555;
    background: #1a1a1a;
    color: #fff;
    font-family: inherit;
    font-size: 1rem;
    cursor: pointer;
    display: none;
  }
  #start-btn.ready { display: block; border-color: #33cc33; color: #33cc33; }
  #start-btn:hover { background: #222; }
  canvas {
    display: none;
    border: 1px solid #222;
    margin-top: 20px;
  }
  #controls {
    margin-top: 15px;
    font-size: 0.75rem;
    color: #555;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <h1>ShadowStrike</h1>

  <div id="select-screen">
    <div class="player-select">
      <h2>Player 1 — WASD + Z/X/C/V</h2>
      <div class="element-buttons" id="p1-elements">
        <button data-element="0">Fire</button>
        <button data-element="1">Lightning</button>
        <button data-element="2">Dark</button>
        <button data-element="3">Ice</button>
      </div>
    </div>
    <div class="player-select">
      <h2>Player 2 — Arrows + J/K/L/;</h2>
      <div class="element-buttons" id="p2-elements">
        <button data-element="0">Fire</button>
        <button data-element="1">Lightning</button>
        <button data-element="2">Dark</button>
        <button data-element="3">Ice</button>
      </div>
    </div>
    <button id="start-btn">FIGHT</button>
  </div>

  <canvas id="game-canvas" width="1200" height="600"></canvas>

  <div id="controls">
    P1: WASD move · Z light · X heavy · C special · V block<br>
    P2: Arrows move · J light · K heavy · L special · ; block
  </div>

  <script type="module">
    import init, { ShadowStrike } from './pkg/client.js';

    let p1Element = null;
    let p2Element = null;

    function setupSelection(containerId, setter) {
      const buttons = document.querySelectorAll(`#${containerId} button`);
      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
          setter(parseInt(btn.dataset.element));
          checkReady();
        });
      });
    }

    function checkReady() {
      const btn = document.getElementById('start-btn');
      if (p1Element !== null && p2Element !== null) {
        btn.classList.add('ready');
      } else {
        btn.classList.remove('ready');
      }
    }

    setupSelection('p1-elements', v => { p1Element = v; });
    setupSelection('p2-elements', v => { p2Element = v; });

    document.getElementById('start-btn').addEventListener('click', async () => {
      if (p1Element === null || p2Element === null) return;

      await init();

      document.getElementById('select-screen').style.display = 'none';
      const canvas = document.getElementById('game-canvas');
      canvas.style.display = 'block';

      const game = new ShadowStrike(p1Element, p2Element);

      document.addEventListener('keydown', e => {
        e.preventDefault();
        game.key_down(e.key);
      });
      document.addEventListener('keyup', e => {
        e.preventDefault();
        game.key_up(e.key);
      });

      function loop(timestamp) {
        game.update(timestamp);
        game.render('game-canvas');
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
